<!DOCTYPE html>
<html lang="en">
<head>
    <title>STEM Quiz - Play</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; margin:0; padding:10px; }
        input { padding: 15px; margin: 10px; font-size: 18px; width: 80%; border-radius: 5px; border: none; }
        .btn { padding: 15px; width: 85%; font-size: 20px; background: #00e676; border: none; font-weight: bold; border-radius: 5px; }
        .pad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 70vh; margin-top: 20px; }
        .pad { border: none; border-radius: 12px; cursor: pointer; }
        .red { background: #e21b3c; } .blue { background: #1368ce; } .yellow { background: #d89e00; } .green { background: #26890c; }
        .waiting { font-size: 24px; margin-top: 40px; color: #aaa; }
    </style>
</head>
<body>

    <div id="join-form">
        <h1>Join STEM Quiz</h1>
        <input type="number" id="pin" placeholder="Enter Game PIN"><br>
        <input type="text" id="nickname" placeholder="Your Nickname"><br>
        <button class="btn" onclick="join()">Join Game</button>
    </div>

    <div id="wait-screen" class="waiting" style="display:none;">
        Look at the master projector screen! <br><br>⏳ Waiting for host...
    </div>

    <div id="game-pads" style="display:none;">
        <h3>Select the correct choice color:</h3>
        <div class="pad-grid">
            <button class="pad red" onclick="sendAnswer(0)"></button>
            <button class="pad blue" onclick="sendAnswer(1)"></button>
            <button class="pad yellow" onclick="sendAnswer(2)"></button>
            <button class="pad green" onclick="sendAnswer(3)"></button>
        </div>
    </div>

    <script>
        const socket = io();
        let myPin = "";

        function join() {
            myPin = document.getElementById('pin').value;
            let name = document.getElementById('nickname').value;
            socket.emit('join-game', { pin: myPin, nickname: name });
        }

        socket.on('join-success', () => {
            document.getElementById('join-form').style.display = "none";
            document.getElementById('wait-screen').style.display = "block";
        });

        socket.on('join-failure', (msg) => {
            alert(msg);
        });

        socket.on('display-question-player', (data) => {
            document.getElementById('wait-screen').style.display = "none";
            document.getElementById('game-pads').style.display = "block";
        });

        function sendAnswer(index) {
            socket.emit('submit-answer', { pin: myPin, answerIndex: index });
            document.getElementById('game-pads').style.display = "none";
            document.getElementById('wait-screen').innerHTML = "Answer Locked In! 👍";
            document.getElementById('wait-screen').style.display = "block";
        }

        socket.on('game-over', (leaderboard) => {
            document.getElementById('game-pads').style.display = "none";
            document.getElementById('wait-screen').innerHTML = "🏁 Game Over! Check the main screen for podium placements.";
        });
    </script>
</body>
</html>
