<!DOCTYPE html>
<html lang="en">
<head>
    <title>STEM Quiz - Host View</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #111; color: white; }
        .btn { padding: 15px 30px; font-size: 20px; background: #00e676; border: none; cursor: pointer; border-radius: 8px; margin: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: 0 auto; }
        .card { padding: 30px; border-radius: 10px; font-size: 24px; font-weight: bold; }
        .red { background: #e21b3c; } .blue { background: #1368ce; } .yellow { background: #d89e00; } .green { background: #26890c; }
        .podium-container {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 400px;
    gap: 15px;
    margin-top: 50px;
}
.podium-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 150px;
}
.pedestal {
    width: 100%;
    color: white;
    font-weight: bold;
    font-size: 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 8px 8px 0 0;
}
.step-1 .pedestal { background: #ffd700; height: 200px; color: #111; } /* Gold */
.step-2 .pedestal { background: #c0c0c0; height: 140px; color: #111; } /* Silver */
.step-3 .pedestal { background: #cd7f32; height: 90px; color: #111; }  /* Bronze */

.player-name { font-size: 22px; font-weight: bold; margin-bottom: 8px; white-space: nowrap; }
.player-score { font-size: 16px; color: #aaa; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>STEM Quiz Host Panel</h1>
        <button class="btn" onclick="createGame()">Create Game Room</button>
        <h2 id="pin-display"></h2>
        <h3>Joined Players:</h3>
        <ul id="player-list" style="list-style:none; font-size:22px;"></ul>
        <button id="start-btn" class="btn" style="display:none;" onclick="nextQuestion()">Start Quiz</button>
    </div>

    <div id="game-arena" style="display:none;">
        <h1 id="question-text"></h1>
        <div class="grid" id="options-grid"></div>
        <button class="btn" onclick="endQuestion()">Time's Up / Show Answers</button>
    </div>

    <div id="scoreboard-arena" style="display:none;">
        <h1>Leaderboard</h1>
        <ol id="leaderboard" style="font-size:24px; text-align:left; max-width:400px; margin:0 auto;"></ol>
        <button class="btn" onclick="nextQuestion()">Next Question</button>
    </div>
        <div id="podium-arena" style="display:none;">
    <h1 style="font-size: 40px; color: #00e676; margin-bottom: 50px;">🏆 STEM Quiz Champions 🏆</h1>
    
    <div class="podium-container">
        <div class="podium-step step-2" id="podium-2" style="visibility: hidden;">
            <div class="player-name" id="p2-name">Player 2</div>
            <div class="pedestal">2nd</div>
            <div class="player-score" id="p2-score">0 pts</div>
        </div>
        
        <div class="podium-step step-1" id="podium-1">
            <div class="player-name" id="p1-name">Player 1</div>
            <div class="pedestal">1st</div>
            <div class="player-score" id="p1-score">0 pts</div>
        </div>
        
        <div class="podium-step step-3" id="podium-3" style="visibility: hidden;">
            <div class="player-name" id="p3-name">Player 3</div>
            <div class="pedestal">3rd</div>
            <div class="player-score" id="p3-score">0 pts</div>
        </div>
    </div>
</div>

    <script>
        const socket = io();
        let currentPin = "";

        function createGame() {
            socket.emit('create-game');
        }

        socket.on('game-created', (pin) => {
            currentPin = pin;
            document.getElementById('pin-display').innerText = "Join at Game PIN: " + pin;
            document.getElementById('start-btn').style.display = "inline-block";
        });

        socket.on('update-player-list', (players) => {
            const list = document.getElementById('player-list');
            list.innerHTML = players.map(p => `<li>🚀 ${p.nickname}</li>`).join('');
        });

        function nextQuestion() {
            document.getElementById('lobby').style.display = "none";
            document.getElementById('scoreboard-arena').style.display = "none";
            document.getElementById('game-arena').style.display = "block";
            socket.emit('next-question', currentPin);
        }

        socket.on('display-question-host', (data) => {
            document.getElementById('question-text').innerHTML = data.q;
            
            const colors = ['red', 'blue', 'yellow', 'green'];
            const grid = document.getElementById('options-grid');
            grid.innerHTML = data.options.map((opt, i) => `
                <div class="card ${colors[i]}">${opt}</div>
            `).join('');

            // Automatically check text and format LaTeX equations dynamically
            renderMathInElement(document.body, {delimiters: [{left: '$', right: '$', display: false}]});
        });

        function endQuestion() {
            socket.emit('end-question', currentPin);
        }

        socket.on('show-results', (data) => {
            document.getElementById('game-arena').style.display = "none";
            document.getElementById('scoreboard-arena').style.display = "block";
            
            const board = document.getElementById('leaderboard');
            board.innerHTML = data.leaderboard
                .sort((a,b) => b.score - a.score)
                .map(p => `<li>${p.nickname}: ${p.score} pts</li>`).join('');
        });
        socket.on('game-over-podium', (podium) => {
    // Hide everything else
            document.getElementById('game-arena').style.display = "none";
            document.getElementById('scoreboard-arena').style.display = "none";
            document.getElementById('lobby').style.display = "none";
    
    // Show Podium Panel
            document.getElementById('podium-arena').style.display = "block";
    
    // Assign 1st Place
            document.getElementById('p1-name').innerText = "🥇 " + podium.first.nickname;
            document.getElementById('p1-score').innerText = podium.first.score + " pts";
    
    // Assign 2nd Place if they exist
            if(podium.second) {
                document.getElementById('podium-2').style.visibility = "visible";
                document.getElementById('p2-name').innerText = "🥈 " + podium.second.nickname;
                document.getElementById('p2-score').innerText = podium.second.score + " pts";
            }
    
    // Assign 3rd Place if they exist
            if(podium.third) {
                document.getElementById('podium-3').style.visibility = "visible";
                document.getElementById('p3-name').innerText = "🥉 " + podium.third.nickname;
                document.getElementById('p3-score').innerText = podium.third.score + " pts";
            }
        });
    </script>
</body>
</html>
